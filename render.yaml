services:
  - type: web
    name: duty-mini-app
    runtime: docker
    plan: starter
    autoDeploy: true
    disk:
      name: duty-data
      mountPath: /app/storage
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /app/storage/db.json
