<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>创业网值班签到系统</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <img class="hero-logo" src="./logo.svg" alt="创业网logo" />
        <div>
          <h1>创业网值班签到系统</h1>
          <p>按本周值班表签到、备注工作内容、记录加班并公共统计导出</p>
        </div>
      </header>

      <section id="toast" class="toast hidden"></section>

      <section id="authView">
        <div class="switches">
          <button class="switch active" id="switchRegister" type="button">注册</button>
          <button class="switch" id="switchLogin" type="button">登录</button>
        </div>

        <form id="registerForm" class="card">
          <h2>新用户注册</h2>
          <label>姓名<input id="regName" placeholder="请输入姓名" required /></label>
          <label>手机号<input id="regPhone" placeholder="请输入11位手机号" required /></label>
          <label>
            部门
            <input id="regDepartment" list="departmentList" placeholder="&#35831;&#36873;&#25321;&#25110;&#36755;&#20837;&#37096;&#38376;" required />
            <datalist id="departmentList">
              <option value="&#25512;&#24191;&#37096;"></option>
              <option value="&#36816;&#33829;&#37096;"></option>
              <option value="&#25216;&#26415;&#37096;"></option>
            </datalist>
          </label>
          <label>密码<input id="regPassword" type="password" placeholder="6-32位，包含字母和数字" required /></label>
          <label>确认密码<input id="regConfirmPassword" type="password" placeholder="再次输入密码" required /></label>
          <button type="submit" class="primary">注册并登录</button>
        </form>

        <form id="loginForm" class="card hidden">
          <h2>账号登录</h2>
          <label>手机号<input id="loginPhone" placeholder="请输入11位手机号" required /></label>
          <label>密码<input id="loginPassword" type="password" placeholder="请输入密码" required /></label>
          <button type="submit" class="primary">登录</button>
        </form>

        <div class="card">
          <div class="inline-head">
            <h2>公共看板（无需登录）</h2>
            <div class="inline-actions">
              <button id="refreshPublicGuestBtn" type="button" class="secondary">刷新</button>
              <button id="exportPublicGuestBtn" type="button" class="primary">导出统计</button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>日期</th>
                  <th>班次</th>
                  <th>姓名</th>
                  <th>手机号</th>
                  <th>部门</th>
                  <th>状态</th>
                  <th>进站</th>
                  <th>出站</th>
                  <th>加班</th>
                </tr>
              </thead>
              <tbody id="publicGuestTableBody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section id="appView" class="hidden">
        <div class="card user-card">
          <div>
            <p class="sub">当前账号</p>
            <h2 id="userName">-</h2>
            <p class="sub"><span id="userPhone">-</span> · <span id="userDepartment">-</span></p>
          </div>
          <button type="button" id="logoutBtn" class="secondary">退出登录</button>
        </div>

        <div class="switches">
          <button class="switch active" id="tabMine" type="button">我的值班</button>
          <button class="switch" id="tabPublic" type="button">公共看板</button>
          <button class="switch" id="tabImport" type="button">导入值班表</button>
        </div>

        <section id="panelMine" class="tab-panel">
          <div class="card">
            <h2>本周安排</h2>
            <p id="currentScheduleInfo" class="sub">暂无值班表，请先导入。</p>
          </div>
          <div id="mySlots" class="cards"></div>
        </section>

        <section id="panelPublic" class="tab-panel hidden">
          <div class="card">
            <div class="inline-head">
              <h2>公共签到与加班看板</h2>
              <div class="inline-actions">
                <button id="refreshPublicBtn" type="button" class="secondary">刷新</button>
                <button id="exportPublicBtn" type="button" class="primary">导出统计</button>
              </div>
            </div>
            <div class="table-wrap">
              <table id="publicTable">
                <thead>
                  <tr>
                    <th>日期</th>
                    <th>班次</th>
                    <th>姓名</th>
                    <th>手机号</th>
                    <th>部门</th>
                    <th>状态</th>
                    <th>进站</th>
                    <th>出站</th>
                    <th>加班</th>
                  </tr>
                </thead>
                <tbody id="publicTableBody"></tbody>
              </table>
            </div>
          </div>
        </section>

        <section id="panelImport" class="tab-panel hidden">
          <div class="card">
            <h2>导入值班表截图</h2>
            <p class="warn">每次确认导入都会清空公共界面的历史签到与加班数据。</p>
            <label>标题<input id="importTitle" placeholder="例如：创业网第七周值班表" /></label>
            <label>本周周一日期<input id="importWeekStart" type="date" /></label>
            <label>值班表文件<input id="importImageFile" type="file" accept="application/pdf,.pdf,image/*" /></label>
            <button id="recognizeBtn" type="button" class="primary">识别文件</button>
            <p id="recognizeResult" class="sub"></p>
          </div>

          <div id="importEditorCard" class="card hidden">
            <h2>识别结果（可编辑后再导入）</h2>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>星期</th>
                    <th>日期</th>
                    <th>开始</th>
                    <th>结束</th>
                    <th>姓名</th>
                    <th>手机号</th>
                    <th>部门</th>
                  </tr>
                </thead>
                <tbody id="importRowsBody"></tbody>
              </table>
            </div>
            <div class="inline-actions">
              <button id="addImportRowBtn" type="button" class="secondary">新增一行</button>
              <button id="confirmImportBtn" type="button" class="primary">确认导入并清空历史</button>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
