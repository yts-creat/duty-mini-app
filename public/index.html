<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>值班签到小程序版</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <h1>值班签到</h1>
        <p>手机号注册 + 值班匹配 + 前后20分钟签到</p>
      </header>

      <section id="toast" class="toast hidden"></section>

      <section id="authView">
        <div class="tabs">
          <button id="tabRegister" class="tab-btn active" type="button">注册</button>
          <button id="tabLogin" class="tab-btn" type="button">登录</button>
        </div>

        <form id="registerForm" class="card">
          <h2>新用户注册</h2>
          <label>手机号<input id="registerPhone" placeholder="请输入11位手机号" /></label>
          <div class="code-row">
            <label class="grow"
              >验证码<input id="registerCode" placeholder="请输入验证码"
            /></label>
            <button id="sendCodeBtn" class="secondary" type="button">获取验证码</button>
          </div>
          <label>密码<input id="registerPassword" type="password" placeholder="6-32位，含字母和数字" /></label>
          <label>确认密码<input id="registerConfirmPassword" type="password" placeholder="再次输入密码" /></label>
          <label>昵称（可选）<input id="registerName" placeholder="例如：张三" /></label>
          <button class="primary" type="submit">注册并登录</button>
        </form>

        <form id="loginForm" class="card hidden">
          <h2>账号登录</h2>
          <label>手机号<input id="loginPhone" placeholder="请输入11位手机号" /></label>
          <label>密码<input id="loginPassword" type="password" placeholder="请输入密码" /></label>
          <button class="primary" type="submit">登录</button>
        </form>
      </section>

      <section id="appView" class="hidden">
        <div class="card profile-card">
          <div>
            <p class="muted">当前账号</p>
            <h2 id="profileName">-</h2>
            <p id="profilePhone" class="muted">-</p>
          </div>
          <button id="logoutBtn" class="secondary" type="button">退出</button>
        </div>

        <form id="scheduleForm" class="card">
          <h2>填写值班表</h2>
          <label>日期<input id="scheduleDate" type="date" /></label>
          <div class="time-grid">
            <label>开始时间<input id="scheduleStartTime" type="time" /></label>
            <label>结束时间<input id="scheduleEndTime" type="time" /></label>
          </div>
          <label>说明<input id="scheduleTitle" placeholder="例如：运营晚班" /></label>
          <button class="primary" type="submit">新增值班安排</button>
        </form>

        <section class="card">
          <div class="list-header">
            <h2>今日值班安排</h2>
            <button id="refreshBtn" class="secondary" type="button">刷新</button>
          </div>
          <div id="scheduleList" class="list"></div>
        </section>

        <section class="card">
          <h2>签到记录</h2>
          <div id="checkinList" class="list"></div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
